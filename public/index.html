<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WMF 2026 – Hub</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #72c1d8;
    --blue-dark: #5aaec5;
    --navy: #022b3d;
    --navy-light: #033d57;
    --bg: #f4f6f9;
    --text: #1a2340;
    --muted: #4a5568;
    --border: #dde3ef;
  }

  html, body {
    height: 100%;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    padding: 14px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-shrink: 0;
    border-bottom: 2px solid var(--blue);
  }

  .header-logos {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .header-logos img {
    height: 44px;
    width: auto;
    object-fit: contain;
  }

  .header-title {
    color: #fff;
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
    opacity: 0.85;
    text-align: right;
  }

  /* ── MAIN ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 32px;
  }

  .cards-label {
    text-align: center;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 28px;
    font-weight: 600;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── CARD ── */
  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 28px 32px;
    text-align: center;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: box-shadow 0.22s, transform 0.22s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--blue);
    opacity: 0;
    transition: opacity 0.22s;
  }

  .card:hover {
    box-shadow: 0 12px 36px rgba(26,35,64,0.14);
    transform: translateY(-4px);
  }

  .card:hover::before { opacity: 1; }

  .card-icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #eaf6fb;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 22px;
    flex-shrink: 0;
  }

  .card-icon svg { width: 38px; height: 38px; }

  .card-num {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--blue);
    font-weight: 700;
    margin-bottom: 10px;
  }

  .card-title {
    font-size: clamp(17px, 2vw, 22px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 0;
    flex: 1;
  }

  .card-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--blue);
    color: #fff;
    padding: 13px 28px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.3px;
    transition: background 0.2s;
    text-decoration: none;
    border: none;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 24px;
  }

  .card-btn:hover { background: var(--blue-dark); }
  .card-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* ── FOOTER ── */
  footer {
    background: var(--navy);
    color: #fff;
    padding: 20px 40px;
    font-size: 12px;
    line-height: 1.6;
    border-top: 1px solid var(--navy-light);
    flex-shrink: 0;
  }

  .footer-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .footer-text { color: #cbd5e1; }
  .footer-text strong { color: #fff; }

  .footer-logos { display: flex; gap: 12px; align-items: center; }
  .footer-logos img { height: 28px; width: auto; object-fit: contain; }

  /* ── LANDSCAPE TABLET: full-screen kiosk, no scroll ── */
  @media (orientation: landscape) and (min-width: 900px) {
    html, body { height: 100vh; overflow: hidden; }
    header { padding: 10px 32px; }
    .header-logos img { height: 36px; }
    main {
      flex: 1;
      min-height: 0;
      padding: 40px 28px;
      justify-content: center;
    }
    .cards-label { margin-bottom: 18px; font-size: 11px; }
    .cards-grid {
      gap: 18px;
      align-items: stretch;
    }
    .card { padding: 18px 20px 18px; border-radius: 14px; justify-content: flex-start; }
    .card .card-btn { margin-top: 14px; }
    .card-icon { width: 48px; height: 48px; margin-bottom: 10px; }
    .card-icon svg { width: 22px; height: 22px; }
    .card-num { margin-bottom: 4px; font-size: 10px; }
    .card-title {
      font-size: clamp(14px, 1.4vw, 17px);
      flex: 0;
      margin-bottom: 0;
    }
    .card-btn { padding: 9px 20px; font-size: 13px; }
    footer { padding: 10px 32px; }
    .footer-logos img { height: 20px; }
    .footer-text { font-size: 11px; }
  }

  /* ── PORTRAIT TABLET ── */
  @media (max-width: 900px) and (orientation: portrait) {
    header { padding: 12px 20px; }
    .header-logos img { height: 36px; }
    .header-title { font-size: 12px; }
    main { padding: 32px 20px; }
    .cards-grid {
      grid-template-columns: repeat(2, 1fr);
      max-width: 700px;
      gap: 20px;
    }
    .cards-grid .card:last-child {
      grid-column: 1 / -1;
      max-width: 360px;
      margin: 0 auto;
      width: 100%;
    }
    .card { padding: 32px 24px 28px; }
  }

  /* ── MOBILE ── */
  @media (max-width: 599px) {
    header { padding: 10px 16px; }
    .header-logos img { height: 30px; }
    .header-title { font-size: 11px; letter-spacing: 1px; }
    main { padding: 28px 16px; }
    .cards-grid { grid-template-columns: 1fr; max-width: 420px; gap: 16px; }
    footer { padding: 16px; }
    .footer-inner { flex-direction: column; align-items: flex-start; gap: 14px; }
  }
</style>
</head>
