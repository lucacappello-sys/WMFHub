<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WMF 2026</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100vh; overflow: hidden; background: #022b3d; }

  iframe {
    display: block;
    width: 100%;
    height: 100vh;
    border: none;
  }

  .home-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 9999;
    background: #72c1d8;
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 12px 20px 12px 16px;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    text-decoration: none;
    transition: background 0.18s, transform 0.15s, box-shadow 0.18s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .home-btn:hover {
    background: #5aaec5;
    transform: scale(1.05);
    box-shadow: 0 6px 24px rgba(0,0,0,0.4);
  }

  .home-btn:active {
    transform: scale(0.97);
  }

  .home-btn svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<iframe id="viewer-frame"
  src=""
  allow="camera *; microphone *; fullscreen *; autoplay *; clipboard-read *; clipboard-write *; display-capture *; encrypted-media *"
  allowfullscreen
></iframe>

<a class="home-btn" href="/" title="Torna alla home">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/>
    <polyline points="9 21 9 12 15 12 15 21"/>
  </svg>
  Home
</a>

<script>
  const params = new URLSearchParams(window.location.search);
  const src = params.get('src');
  if (src) {
    document.getElementById('viewer-frame').src = src;
    const title = params.get('title');
    if (title) document.title = title + ' — WMF 2026';
  } else {
    window.location.href = '/';
  }
</script>

</body>
</html>
